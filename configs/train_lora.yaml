base_model_path: ${QWEN3_BASE_MODEL_PATH}
train_data_path: data/sft/train.jsonl
val_data_path: data/sft/val.jsonl
output_dir: ${QWEN3_LORA_OUTPUT_DIR}
max_seq_length: 4096
learning_rate: 2.0e-4
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
bf16: true
fp16: false
gradient_checkpointing: true
logging_steps: 10
save_steps: 100
eval_steps: 100
